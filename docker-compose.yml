  mcp_server:
    build:
      context: .
      dockerfile: Dockerfile.mcp
    command: uvicorn src.pg_mcp:app --host 0.0.0.0 --port 8000 --log-level debug
    expose:
      - "8000"                     # expose to other containers only (OK)
    environment:
      POSTGRES_HOST: postgres      # <- match service name
      POSTGRES_PORT: "5432"
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_DATABASE: llm_data_db
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      # keep your python socket check or use curl; either works
      test: ["CMD-SHELL", "python - <<'PY'\nimport socket,sys\ns=socket.socket(); s.settimeout(1)\ntry:\n  s.connect(('127.0.0.1',8000)); sys.exit(0)\nexcept Exception:\n  sys.exit(1)\nPY"]
      interval: 5s
      timeout: 2s
      retries: 20
    networks:
      - llm-docker-setup_default

                         

  fastapi:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - llm-docker-setup_default
    env_file:
      - .env
    depends_on:
      mcp_server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      ollama:
        condition: service_started
    environment:
      APP_MODULE: src.llm_api:app
      PG_DSN: postgres://admin:password@postgres:5432/llm_data_db
      MCP_URL: http://mcp_server:8000
      OLLAMA_MODEL: llama3.2:3b
      OLLAMA_BASE_URL: http://ollama:11434
      OLLAMA_JSON_TIMEOUT: "300"   # <-- no space
      OLLAMA_TIMEOUT: "300"        # <-- no space
    volumes:
      - .:/app
      # Mount your host’s Ollama models into the container
      - ${HOME}/.ollama:/root/.ollama:ro
      
  
  grafana:
    image: grafana/grafana:latest
    container_name: grafana
    ports:
      - "3000:3000"
    networks:
      - llm-docker-setup_default
    environment:
      GF_FEATURE_TOGGLES_ENABLE: "accesscontrol"
  
    
  grafana-mcp:
    build:
      context: .
      dockerfile: Dockerfile.grafana-mcp
    ports:
      - "8002:8000"
    container_name: grafana-mcp    
    networks:
      - llm-docker-setup_default
    environment:
      APP_MODULE: src.grafana_mcp:app
    depends_on:
      - grafana


volumes:
  ollama:
  postgres_data:
  minio_data:

networks:
  llm-docker-setup_default:
    name: llm-docker-setup_default
    driver: bridge
