  mcp_server:
    build:
      context: .                # Set context to root (so src/ is visible)
      dockerfile: Dockerfile.mcp  # Use the Dockerfile inside root
    ports:
      - "8001:8000"
    networks:
      - llm-docker-setup_default
    depends_on:
      - postgres
    environment:
      APP_MODULE: src.pg_mcp:app
      POSTGRES_DATABASE: llm_data_db
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password
      POSTGRES_PORT: 5432


  fastapi:
    build:
      context: .
      dockerfile: src/Dockerfile
    ports:
      - "8000:8000"
    networks:
      - llm-docker-setup_default
    env_file:
      - .env
    depends_on:
      # - mlflow
      - mcp_server
    environment:
      APP_MODULE: src.llm_api:app

volumes:
  ollama:
  postgres_data:
  minio_data:

networks:
  llm-docker-setup_default:
    name: llm-docker-setup_default
    driver: bridge
